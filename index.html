<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Survival Army Game</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background:#111; color:white; text-align:center; overflow:hidden; }
  canvas { background:#222; display:block; margin:20px auto; border:2px solid #555; }
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    z-index: 10;
  }
  .hidden { display:none; }
</style>
</head>
<body>

<div id="startScreen" class="overlay">
  <h1>Survival Army Game</h1>
  <button class="btn btn-success mt-3" id="startBtn">Start Game</button>
</div>

<div id="gameOverScreen" class="overlay hidden">
  <h1>Game Over</h1>
  <p id="finalScore" class="mt-2"></p>
  <button class="btn btn-primary mt-3" id="restartBtn">Restart</button>
</div>

<h1 class="mt-3">Survival Army Game</h1>
<p>Move with Arrow Keys | Shoot with Space</p>
<canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let player, bullets, enemies, score, keys;
let gameRunning = false;
let spawnTimer = null;

const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const finalScoreEl = document.getElementById('finalScore');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');

function initGame() {
  player = { x: 280, y: 350, width: 40, height: 40, speed: 4 };
  bullets = [];
  enemies = [];
  score = 0;
  keys = {};
}

function startGame() {
  initGame();
  startScreen.classList.add('hidden');
  gameOverScreen.classList.add('hidden');
  gameRunning = true;
  startSpawning();
}

function endGame() {
  if (!gameRunning) return;
  gameRunning = false;
  stopSpawning();
  finalScoreEl.textContent = 'Score: ' + score;
  gameOverScreen.classList.remove('hidden');
}

function startSpawning() {
  stopSpawning();
  spawnTimer = setInterval(() => {
    if (!gameRunning) return;
    enemies.push({
      x: Math.random() * (canvas.width - 30),
      y: 0,
      width: 30,
      height: 30,
      speed: 1.8 + Math.random() * 1.6
    });
  }, 1100);
}

function stopSpawning() {
  if (spawnTimer) clearInterval(spawnTimer);
  spawnTimer = null;
}

// Controls
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

window.addEventListener('keydown', e => {
  if (e.code === 'Space' && gameRunning) {
    bullets.push({ x: player.x + 18, y: player.y, width: 5, height: 10 });
  }
});

function update() {
  if (!gameRunning) return;

  if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
  if (keys['ArrowRight'] && player.x < canvas.width - player.width) player.x += player.speed;

  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.y -= 6;
    if (b.y < 0) bullets.splice(i, 1);
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;

    if (e.y > canvas.height) {
      endGame();
      return;
    }
  }

  for (let ei = enemies.length - 1; ei >= 0; ei--) {
    const e = enemies[ei];
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];
      if (
        b.x < e.x + e.width &&
        b.x + b.width > e.x &&
        b.y < e.y + e.height &&
        b.y + b.height > e.y
      ) {
        enemies.splice(ei, 1);
        bullets.splice(bi, 1);
        score++;
        break;
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!gameRunning) return;

  ctx.fillStyle = 'blue';
  ctx.fillRect(player.x, player.y, player.width, player.height);

  ctx.fillStyle = 'yellow';
  bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

  ctx.fillStyle = 'red';
  enemies.forEach(e => ctx.fillRect(e.x, e.y, e.width, e.height));

  ctx.fillStyle = 'white';
  ctx.font = '18px Arial';
  ctx.fillText('Score: ' + score, 10, 20);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

startBtn.addEventListener('click', startGame);
restartBtn.addEventListener('click', startGame);

gameLoop();
</script>

</body>
</html>
